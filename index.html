<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Ops Center</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 40px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px;
        }

        /* Dashboard Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        .cdn-card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .cdn-card:hover { transform: translateY(-4px); border-color: var(--primary); }

        .cdn-icon { font-size: 3rem; margin-bottom: 15px; color: var(--primary); }

        .status-dot {
            width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px;
        }

        /* Detail Sidebar/Overlay */
        #detail-view {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100%;
            background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.3s ease; padding: 30px; overflow-y: auto; z-index: 100;
        }

        #detail-view.active { right: 0; }

        .close-btn { cursor: pointer; font-size: 1.5rem; float: right; }

        .incident-item {
            padding: 15px 0; border-bottom: 1px solid #f1f5f9;
        }

        .incident-item h4 { margin: 0 0 5px 0; font-size: 1rem; }
        .incident-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }

        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 90;
        }

        .setup-warning {
            grid-column: 1 / -1;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            color: #92400e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0">CDN Ops Center</h1>
            <p style="color:var(--text-muted); margin: 5px 0 0 0;">Real-time infrastructure health</p>
        </div>
        <button onclick="fetchAllData()" style="background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
            <i class="ph ph-arrows-clockwise"></i> Refresh All
        </button>
    </header>

    <div class="grid" id="cdn-grid">
        </div>
</div>

<div id="overlay" class="overlay" onclick="closeDetails()"></div>
<div id="detail-view">
    <span class="close-btn" onclick="closeDetails()"><i class="ph ph-x"></i></span>
    <h2 id="detail-title">Service Details</h2>
    <hr>
    <div id="detail-content"></div>
</div>

<script>
    // --- CONFIGURATION ---
    // 1. Deploy the Code.gs file as a Google Apps Script Web App
    // 2. Paste your Web App URL below
    const PROXY_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
    
    const CDNS = [
        { name: 'Cloudflare', url: 'https://www.cloudflarestatus.com/history.rss', icon: 'ph-cloud' },
        { name: 'Fastly', url: 'https://status.fastly.com/history.rss', icon: 'ph-lightning' },
        { name: 'Akamai', url: 'https://www.akamaistatus.com/history.rss', icon: 'ph-broadcast' },
        { name: 'AWS', url: 'https://status.aws.amazon.com/rss/all.rss', icon: 'ph-amazon-logo' }
    ];

    let cachedData = {};

    async function fetchAllData() {
        const grid = document.getElementById('cdn-grid');
        
        // Safety check for setup
        if (PROXY_URL.includes('YOUR_APPS_SCRIPT_URL')) {
            grid.innerHTML = `
                <div class="setup-warning">
                    <h3>⚠️ Configuration Required</h3>
                    <p>Please update the <b>PROXY_URL</b> in the script section of index.html with your deployed Google Apps Script URL.</p>
                </div>`;
            return;
        }

        grid.innerHTML = '<p>Analyzing feeds...</p>';

        for (const cdn of CDNS) {
            try {
                const response = await fetch(`${PROXY_URL}?url=${encodeURIComponent(cdn.url)}`);
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const items = Array.from(xml.querySelectorAll("item")).map(i => ({
                    title: i.querySelector("title")?.textContent,
                    date: i.querySelector("pubDate")?.textContent,
                    desc: i.querySelector("description")?.textContent,
                    link: i.querySelector("link")?.textContent
                }));

                cachedData[cdn.name] = items;
                renderCard(cdn, items);
            } catch (e) {
                console.error(e);
            }
        }
        
        if(grid.firstChild && grid.firstChild.tagName === 'P') grid.removeChild(grid.firstChild);
    }

    function renderCard(cdn, items) {
        const grid = document.getElementById('cdn-grid');
        const latest = items[0]?.title.toLowerCase() || "";
        
        let statusColor = varName('--success');
        if (latest.includes('investigating') || latest.includes('identified')) statusColor = varName('--danger');
        else if (latest.includes('scheduled') || latest.includes('maintenance')) statusColor = varName('--warning');

        const card = document.createElement('div');
        card.className = 'cdn-card';
        card.onclick = () => showDetails(cdn.name);
        card.innerHTML = `
            <i class="cdn-icon ph ${cdn.icon}"></i>
            <h3 style="margin:0">${cdn.name}</h3>
            <div style="margin-top:10px; font-size:0.9rem">
                <span class="status-dot" style="background:${statusColor}"></span>
                ${items.length > 0 ? 'Data Active' : 'No Recent Events'}
            </div>
        `;
        grid.appendChild(card);
    }

    function showDetails(name) {
        const items = cachedData[name];
        document.getElementById('detail-title').innerText = `${name} History`;
        document.getElementById('detail-content').innerHTML = items.map(item => `
            <div class="incident-item">
                <h4><a href="${item.link}" target="_blank" style="color:var(--primary); text-decoration:none">${
